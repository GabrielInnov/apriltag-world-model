# Configuration du world model AprilTag

tag:
  family: tag36h11      # famille des marqueurs
  size_m: 0.023          # taille physique du tag en mètres (bord noir extérieur)
  reference_id: 0        # id du tag qui définit l'origine du monde
  origin: bottom_left    # (0,0,0) sur le tag de référence : center | top_left | top_right | bottom_left | bottom_right

camera:
  source: auto          # auto = Daheng si branchée, sinon webcam (branche/débranche sans rien changer)
  webcam_index: 1       # Kurokesu USB = index 1 (index 0 = cam integree de l'ordi)
  webcam_width: 1920    # capture en 1920x1080 = résolution de calibration -> K exact
  webcam_height: 1080
  exposure_us: 1000     # Daheng : µs ou auto. (la webcam gère son expo seule)
  binning: 2            # Daheng : 1 ou 2 (ignoré pour la webcam)
  # Intrinsèques choisies AUTOMATIQUEMENT selon la caméra réellement ouverte :
  intrinsics_daheng: calibration/camera_intrinsics.yaml
  intrinsics_webcam: calibration/webcam_intrinsics.yaml
  intrinsics: calibration/camera_intrinsics.yaml   # repli si type inconnu (ex. fichier vidéo)

detection:
  nthreads: 4
  quad_decimate: 2.0    # >1.0 = plus rapide mais moins précis (2.0 = bon compromis avec binning 2)
  decode_sharpening: 0.25
  subpixel: true        # raffinage sous-pixel des coins (précision)
  temporal_avg: true    # moyennage des coins quand la caméra est quasi immobile (répétabilité)

mapping:
  enabled: true         # true = on calibre (ajoute les tags). false = carte figée, localisation seule. Touche [c] pour basculer
  # --- Qualité : un tag n'est ajouté à la carte que si sa pose est SÛRE ---
  min_observations: 3       # nb d'observations cohérentes min avant de figer un tag
  min_decision_margin: 15   # qualité min d'une détection pour être utilisée (0 = pas de filtre)
  min_tag_pixels: 12        # taille apparente min du tag (px) pour être utilisée (0 = pas de filtre)
  rot_coherence_min: 0.99   # cohérence rotationnelle min (0..1) ; plus haut = plus exigeant
  max_trans_std_m: 0.05     # dispersion max de la translation (m) tolérée pour figer un tag
  refine_iters: 10          # optimisation du graphe de poses (fermeture de boucle) ; 0 = désactivé
  auto_refine: true         # lancer le bundle adjustment AUTOMATIQUEMENT à chaque sauvegarde (corrige la dérive Z)
  # --- Statut "acquis" : un tag est SÛR (vert) sans être figé. C'est un filtre de
  #     confiance (ajouter quand sûr), pas un verrou : le BA continue de tout optimiser. ---
  acquire_sigma_mm: 1.0     # incertitude max (mm, issue du BA) pour qu'un tag soit "acquis"
  acquire_parallax_deg: 60  # parallaxe min (deg) requise
  acquire_min_obs: 30       # observations min requises
  export_only_acquired: false  # n'exporter (JSON/CSV) QUE les tags acquis ?
  # --- Verrouillage des tags confiants (désactivé : on laisse le BA tout ré-optimiser) ---
  freeze_confident: false   # figer la pose d'un tag une fois confiant (false = recommandé)
  freeze_reproj_px: 1.0     # erreur de reprojection max pour figer (plus bas = plus strict)
  freeze_min_obs: 15        # nb d'images min vu avant de pouvoir figer
  freeze_min_views: 3       # nb de POINTS DE VUE distincts requis par tag (évite de figer un tag mal contraint, sans limite globale) ; un tag figé le reste définitivement

visualization:
  enabled: true         # (réservé) visu 3D disponible
  autostart: false      # false = la vue 3D s'ouvre via le bouton "Afficher vue 3D" ; true = au démarrage
  trace: true           # afficher la trace (trajectoire) de la caméra en 3D (touche [t] / bouton pour basculer)

export:
  path: world_model.json
